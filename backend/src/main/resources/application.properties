server.port=8080
spring.application.name=swim-backend

# Comma-separated list of origins allowed to call the API.
# Vite's dev server default is localhost:5173.
app.cors.allowed-origins=http://localhost:5173,http://127.0.0.1:5173

# How long fetched schedule data is cached before re-fetching from UBC, in minutes.
app.schedule.cache-minutes=10

# File-based H2 database for swim records (persists across restarts).
# The .mv.db file is created under backend/data/ on first run.
spring.datasource.url=jdbc:h2:file:./data/swim-db;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
