server.port=8080
spring.application.name=swim-backend

# Comma-separated list of origins allowed to call the API.
# Vite's dev server default is localhost:5173.
app.cors.allowed-origins=http://localhost:5173,http://127.0.0.1:5173

# How long fetched schedule data is cached before re-fetching from UBC, in minutes.
app.schedule.cache-minutes=10

# File-based H2 database for swim records (persists across restarts).
# The .mv.db file is created under backend/data/ on first run.
spring.datasource.url=jdbc:h2:file:./data/swim-db;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# Allow large profile-photo data URLs in request bodies (default is ~256KB-2MB).
spring.servlet.multipart.max-request-size=8MB
server.tomcat.max-http-form-post-size=8MB
server.tomcat.max-swallow-size=8MB

# ---- Third-party login (OAuth) ----
# SCAFFOLD: fill these in to enable "Continue with Google / Instagram".
# Leave blank to keep social login disabled (the API returns 501 Not Implemented).
# redirect-base   = public base URL of THIS backend (provider redirects here)
# frontend-success = SPA URL to land on after login (token arrives in the URL hash)
app.oauth.redirect-base=http://localhost:8080
app.oauth.frontend-success=http://localhost:5173
app.oauth.google.client-id=
app.oauth.google.client-secret=
app.oauth.instagram.client-id=
app.oauth.instagram.client-secret=
